<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="每天一點點，王國慢慢亮起來" />
  <meta name="theme-color" content="#070a14" />
  <!-- manifest link injected by vite-plugin-pwa at build/dev time -->
  <link rel="apple-touch-icon" href="/Kindling/icons/icon-192.png" />
  <title>信心王國</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #070a14;
      --surface: #0f1424;
      --border:  #1e2540;
      --text:    #cdd9ff;
      --muted:   #5a6a9a;
      --nav-h:   56px;
    }

    /* ── Root: lock body to one screen ── */
    html, body {
      height: 100dvh;
      overflow: hidden;
      background: transparent;
    }
    body {
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
    }

    /* ── App shell ── */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      /* Push content below notch */
      padding-top: env(safe-area-inset-top);
      overflow: hidden;
    }

    /* ── Views ── */
    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      /* Reserve space for fixed nav + bottom gesture bar */
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    }
    .view.active { display: flex; }

    /* ══════════════════════════════════
       首頁：王國（上）＋ 卡片（下）
    ══════════════════════════════════ */

    /* Kingdom takes all leftover height */
    #kingdom-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    #canvas-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      display: block;
      /* Exact size set by ResizeObserver in main.js: min(width, height) */
    }

    #stats {
      flex-shrink: 0;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      padding: 3px 0 2px;
      letter-spacing: 0.02em;
    }

    /* Cards section — compact to fit in lower half */
    #cards-section {
      flex-shrink: 0;
      padding: 6px 10px 0;
    }

    #cards-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card {
      background: rgba(15, 20, 36, 0.82);
      border: 1px solid var(--border);
      border-left: 3px solid var(--attr-color, var(--border));
      border-radius: 9px;
      padding: 7px 11px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: opacity 0.3s;
    }
    .card.completed { opacity: 0.4; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
    }
    .card-role {
      background: var(--border);
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .card-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--attr-color, var(--muted));
      box-shadow: 0 0 4px var(--attr-color, transparent);
    }
    .card-attr { color: var(--attr-color, var(--muted)); }

    .card-text {
      font-size: 13px;
      line-height: 1.4;
    }

    .card-actions { display: flex; gap: 6px; }

    .btn-complete {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--attr-color, var(--border));
      background: transparent;
      color: var(--attr-color, var(--text));
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.18s, color 0.18s;
    }
    .btn-complete:hover:not(:disabled) {
      background: var(--attr-color, var(--border));
      color: #070a14;
    }
    .btn-complete:disabled { opacity: 0.45; cursor: default; }

    .btn-swap {
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 7px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
      transition: border-color 0.18s, color 0.18s;
    }
    .btn-swap:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
    .btn-swap:disabled { opacity: 0.3; cursor: default; }

    /* ══════════════════════════════════
       卡冊頁：獨立捲動
    ══════════════════════════════════ */
    #view-codex {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0;
    }

    #codex-header {
      font-size: 13px;
      color: var(--muted);
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(7, 10, 20, 0.92);
      backdrop-filter: blur(4px);
      z-index: 1;
    }
    #codex-header span { color: var(--text); font-weight: 600; }

    /* Card grid */
    #codex-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 14px;
    }

    /* Each wrapper keeps the card's aspect ratio */
    .codex-card-wrapper {
      aspect-ratio: 3 / 4;
      perspective: 900px;
      cursor: pointer;
    }

    /* Flippable card — transforms the inner element */
    .codex-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.38s ease;
    }
    .codex-card.flipped { transform: rotateY(180deg); }

    /* Shared base for face and back */
    .codex-face, .codex-back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      padding: 10px;
      overflow: hidden;
    }

    /* Card face: attribute color top border, title at bottom */
    .codex-face {
      background: rgba(15, 20, 36, 0.92);
      border: 1px solid var(--border);
      border-top: 3px solid var(--attr-color, var(--border));
      justify-content: flex-end;
      gap: 3px;
    }
    .codex-face-glow {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .codex-face-orb {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--attr-color, var(--muted));
      opacity: 0.22;
      box-shadow: 0 0 22px 6px var(--attr-color, transparent);
    }
    .codex-face-attr {
      font-size: 10px;
      color: var(--attr-color, var(--muted));
      letter-spacing: 0.06em;
    }
    .codex-face-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    /* Card back: date + challenge text + story */
    .codex-back {
      background: rgba(8, 12, 24, 0.97);
      border: 1px solid var(--attr-color, var(--border));
      transform: rotateY(180deg);
      gap: 6px;
    }
    .codex-back-date {
      font-size: 10px;
      color: var(--attr-color, var(--muted));
      flex-shrink: 0;
    }
    .codex-back-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
    }
    .codex-back-story {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
      font-style: italic;
      flex-shrink: 0;
    }

    #codex-empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 14px;
      line-height: 1.7;
    }

    /* ══════════════════════════════════
       底部導覽（fixed，只有兩頁）
    ══════════════════════════════════ */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(15, 20, 36, 0.88);
      border-top: 1px solid rgba(30, 37, 64, 0.7);
      display: flex;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: color 0.18s;
    }
    .nav-btn.active { color: var(--text); }

    /* ══════════════════════════════════
       Onboarding 流程（首次開啟）
    ══════════════════════════════════ */
    #view-onboarding {
      padding-bottom: env(safe-area-inset-bottom);
      align-items: center;
      justify-content: center;
    }

    .ob-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 340px;
      padding: 0 24px;
    }

    .ob-avatar { font-size: 52px; line-height: 1; }

    .ob-bubble {
      background: rgba(15, 20, 36, 0.85);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      font-size: 15px;
      line-height: 1.8;
      text-align: center;
      color: var(--text);
      width: 100%;
    }
    .ob-bubble p + p { margin-top: 6px; }

    .btn-ob-continue {
      padding: 10px 32px;
      border: 1px solid rgba(205, 217, 255, 0.5);
      background: transparent;
      color: var(--text);
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }
    .btn-ob-continue:hover { background: rgba(255,255,255,0.07); border-color: var(--text); }

    .ob-question {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
    }

    .ob-directions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .btn-direction {
      background: rgba(15, 20, 36, 0.82);
      border: 1px solid var(--border);
      border-left: 3px solid var(--dir-color, var(--border));
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s, background 0.18s;
    }
    .btn-direction:hover {
      background: rgba(15, 20, 36, 0.96);
      border-left-color: var(--dir-color, var(--muted));
      border-color: rgba(205, 217, 255, 0.25);
    }

    /* ── SW update banner (persistent, user-triggered reload) ── */
    #update-banner {
      display: none;
      position: fixed;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2540;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 12px;
      padding: 8px 14px;
      gap: 10px;
      align-items: center;
      white-space: nowrap;
      z-index: 300;
      max-width: 88vw;
    }
    #update-banner button {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #1e2540;
      color: var(--text);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      white-space: nowrap;
      max-width: 88vw;
      z-index: 200;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Full-screen star background — behind everything -->
  <canvas id="bg-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>

  <div id="app">

    <!-- Onboarding（首次開啟，選方向） -->
    <div id="view-onboarding" class="view">
      <div id="ob-step1" class="ob-step">
        <div class="ob-avatar">🌱</div>
        <div class="ob-bubble">
          <p>嗨，你來了。</p>
          <p>這裡有一座還在沉睡的小王國，<br>正等著醒過來。</p>
          <p>不用一次做很多，每天一點點，<br>它就會慢慢亮起來。</p>
        </div>
        <button class="btn-ob-continue" id="btn-ob-continue">繼續 →</button>
      </div>
      <div id="ob-step2" class="ob-step" style="display:none">
        <div class="ob-question">你想先往哪個方向走走？</div>
        <div class="ob-directions" id="ob-directions"></div>
      </div>
    </div>

    <!-- 首頁：王國（上）＋ 三張卡（下），一屏同框 -->
    <div id="view-home" class="view">
      <section id="kingdom-section">
        <div id="canvas-wrap">
          <canvas id="kingdom" width="400" height="400"></canvas>
        </div>
        <div id="stats"></div>
      </section>
      <section id="cards-section">
        <div id="cards-container">
          <div style="color:var(--muted);text-align:center;padding:16px;font-size:12px">載入中…</div>
        </div>
      </section>
    </div>

    <!-- 信心卡冊（獨立分頁，此頁可捲動） -->
    <div id="view-codex" class="view">
      <div id="codex-header">已收藏 <span id="codex-count">0</span> 張</div>
      <div id="codex-grid"></div>
      <div id="codex-empty">還沒有卡<br>完成第一張，它就會進入卡冊</div>
    </div>

    <nav id="bottom-nav">
      <button class="nav-btn active" id="nav-home"  onclick="showView('home')">🏰 首頁</button>
      <button class="nav-btn"        id="nav-codex" onclick="showView('codex')">📖 卡冊</button>
    </nav>
  </div>

  <div id="update-banner">
    有新版本&emsp;<button id="btn-update-apply">更新</button>
  </div>
  <div id="toast"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
