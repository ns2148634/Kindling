<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>信心王國</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #070a14;
      --surface: #0f1424;
      --border:  #1e2540;
      --text:    #cdd9ff;
      --muted:   #5a6a9a;
      --nav-h:   56px;
    }

    /* ── Root: lock body to one screen ── */
    html, body {
      height: 100dvh;
      overflow: hidden;
      background: transparent;
    }
    body {
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
    }

    /* ── App shell ── */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      /* Push content below notch */
      padding-top: env(safe-area-inset-top);
      overflow: hidden;
    }

    /* ── Views ── */
    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      /* Reserve space for fixed nav + bottom gesture bar */
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    }
    .view.active { display: flex; }

    /* ══════════════════════════════════
       首頁：王國（上）＋ 卡片（下）
    ══════════════════════════════════ */

    /* Kingdom takes all leftover height */
    #kingdom-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    #canvas-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      display: block;
      /* Exact size set by ResizeObserver in main.js: min(width, height) */
    }

    #stats {
      flex-shrink: 0;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      padding: 3px 0 2px;
      letter-spacing: 0.02em;
    }

    /* Cards section — compact to fit in lower half */
    #cards-section {
      flex-shrink: 0;
      padding: 6px 10px 0;
    }

    #cards-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card {
      background: rgba(15, 20, 36, 0.82);
      border: 1px solid var(--border);
      border-left: 3px solid var(--attr-color, var(--border));
      border-radius: 9px;
      padding: 7px 11px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: opacity 0.3s;
    }
    .card.completed { opacity: 0.4; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
    }
    .card-role {
      background: var(--border);
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .card-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--attr-color, var(--muted));
      box-shadow: 0 0 4px var(--attr-color, transparent);
    }
    .card-attr { color: var(--attr-color, var(--muted)); }

    .card-text {
      font-size: 13px;
      line-height: 1.4;
    }

    .card-actions { display: flex; gap: 6px; }

    .btn-complete {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--attr-color, var(--border));
      background: transparent;
      color: var(--attr-color, var(--text));
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.18s, color 0.18s;
    }
    .btn-complete:hover:not(:disabled) {
      background: var(--attr-color, var(--border));
      color: #070a14;
    }
    .btn-complete:disabled { opacity: 0.45; cursor: default; }

    .btn-swap {
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 7px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
      transition: border-color 0.18s, color 0.18s;
    }
    .btn-swap:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
    .btn-swap:disabled { opacity: 0.3; cursor: default; }

    /* ══════════════════════════════════
       圖鑑頁：獨立捲動
    ══════════════════════════════════ */
    #view-codex {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 14px 0;
    }

    #codex-header {
      font-size: 13px;
      color: var(--muted);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      background: rgba(7, 10, 20, 0.92);
      backdrop-filter: blur(4px);
      z-index: 1;
    }
    #codex-header span { color: var(--text); font-weight: 600; }

    #codex-list { list-style: none; display: flex; flex-direction: column; }

    .codex-entry {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .codex-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dot-color, var(--muted));
      box-shadow: 0 0 6px var(--dot-color, transparent);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .codex-text { font-size: 14px; margin-bottom: 3px; }
    .codex-date { font-size: 11px; color: var(--muted); }

    #codex-empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 14px;
      line-height: 1.7;
    }

    /* ══════════════════════════════════
       底部導覽（fixed，只有兩頁）
    ══════════════════════════════════ */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(15, 20, 36, 0.88);
      border-top: 1px solid rgba(30, 37, 64, 0.7);
      display: flex;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: color 0.18s;
    }
    .nav-btn.active { color: var(--text); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #1e2540;
      color: var(--text);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      white-space: nowrap;
      max-width: 88vw;
      z-index: 200;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Full-screen star background — behind everything -->
  <canvas id="bg-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>

  <div id="app">

    <!-- 首頁：王國（上）＋ 三張卡（下），一屏同框 -->
    <div id="view-home" class="view active">
      <section id="kingdom-section">
        <div id="canvas-wrap">
          <canvas id="kingdom" width="400" height="400"></canvas>
        </div>
        <div id="stats"></div>
      </section>
      <section id="cards-section">
        <div id="cards-container">
          <div style="color:var(--muted);text-align:center;padding:16px;font-size:12px">載入中…</div>
        </div>
      </section>
    </div>

    <!-- 信心圖鑑（獨立分頁，此頁可捲動） -->
    <div id="view-codex" class="view">
      <div id="codex-header">已記下 <span id="codex-count">0</span> 件做到的事</div>
      <ul id="codex-list"></ul>
      <div id="codex-empty">還沒有紀錄<br>完成第一張卡，這裡就會多一筆</div>
    </div>

    <nav id="bottom-nav">
      <button class="nav-btn active" id="nav-home"  onclick="showView('home')">🏰 首頁</button>
      <button class="nav-btn"        id="nav-codex" onclick="showView('codex')">📖 圖鑑</button>
    </nav>
  </div>

  <div id="toast"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
